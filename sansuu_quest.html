<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SANSUU QUEST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito','Hiragino Kaku Gothic ProN',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;}
.app{max-width:420px;margin:0 auto;padding-bottom:90px;}

#titleScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.title-logo{font-size:32px;font-weight:900;color:#fff;text-shadow:4px 4px 0 #1a1c38;letter-spacing:2px;margin-bottom:4px;}
.title-logo span{color:#ff6b35;}
.title-sub{font-size:12px;font-weight:700;color:#8890cc;letter-spacing:3px;margin-bottom:40px;}
.title-label{font-size:11px;font-weight:900;color:#ffd700;letter-spacing:2px;margin-bottom:14px;text-shadow:1px 1px 0 #b8a000;}

.save-slot{width:100%;background:#2a2d55;border:3px solid #3a3e70;border-radius:14px;box-shadow:0 6px 0 #14162e;padding:16px;margin-bottom:12px;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;display:flex;align-items:center;gap:14px;text-align:left;font-family:'Nunito',sans-serif;}
.save-slot:active{transform:translateY(5px);box-shadow:0 1px 0 #14162e;}
.save-slot:hover{border-color:#5a5e90;}
.save-slot.empty{border-style:dashed;opacity:0.6;}
.slot-icon{width:56px;height:56px;background:#1e2040;border:2px solid #3a3e70;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.slot-info{flex:1;}
.slot-name{font-size:16px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #1e2040;}
.slot-stats{font-size:11px;font-weight:700;color:#8890cc;margin-top:4px;line-height:1.8;}
.slot-new{font-size:14px;font-weight:900;color:#8890cc;}
.slot-del{background:#5a0a0a;border:2px solid #e74c3c;border-radius:8px;padding:4px 10px;font-size:10px;font-weight:900;color:#e74c3c;cursor:pointer;flex-shrink:0;}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#2a2d55;border:3px solid #3a3e70;border-radius:16px;box-shadow:0 8px 0 #14162e;padding:24px;width:100%;max-width:360px;}
.modal-title{font-size:16px;font-weight:900;color:#ffd700;text-shadow:1px 1px 0 #b8a000;margin-bottom:16px;text-align:center;}
.modal input{width:100%;background:#1e2040;border:3px solid #3a3e70;border-radius:10px;padding:12px 14px;font-size:16px;font-weight:700;color:#fff;font-family:'Nunito',sans-serif;margin-bottom:14px;outline:none;}
.modal input:focus{border-color:#ff6b35;}
.modal-btn{width:100%;padding:14px;background:#ff6b35;border:3px solid #c94f20;border-radius:12px;box-shadow:0 5px 0 #8a3610;color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;text-shadow:1px 1px 0 #c94f20;}
.modal-cancel{width:100%;padding:10px;margin-top:8px;background:none;border:2px solid #3a3e70;border-radius:10px;color:#8890cc;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}

.hdr{background:#252849;border-bottom:4px solid #1a1c38;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
.hdr-logo{font-size:15px;font-weight:900;color:#fff;text-shadow:2px 2px 0 #1a1c38;letter-spacing:1px;}
.hdr-logo span{color:#ff6b35;}
.hdr-right{display:flex;gap:6px;align-items:center;}
.streak-pill{background:#ffd700;border:3px solid #b8a000;border-radius:8px;padding:4px 9px;font-size:12px;font-weight:900;color:#1a1a2e;}
.coins-pill{background:#ff6b35;border:3px solid #c94f20;border-radius:8px;padding:4px 9px;font-size:12px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #c94f20;}
.back-title-btn{background:#3a3e70;border:2px solid #2a2d55;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:900;color:#aaa;cursor:pointer;font-family:'Nunito',sans-serif;}

.tabs{display:flex;background:#1e2040;border-bottom:4px solid #14162e;padding:0 8px;gap:4px;position:sticky;top:58px;z-index:29;}
.tab{flex:1;padding:10px 4px;font-size:11px;font-weight:900;color:#555;background:none;border:none;cursor:pointer;letter-spacing:0.5px;border-bottom:4px solid transparent;margin-bottom:-4px;transition:color 0.15s;font-family:'Nunito',sans-serif;}
.tab.active{color:#fff;border-bottom-color:#ff6b35;}

.screen{display:none;padding:12px;}
.screen.active{display:block;}

.partner-wrap{background:#2a2d55;border:3px solid #1e2040;border-radius:14px;box-shadow:0 6px 0 #14162e;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.partner-block{width:78px;height:78px;background:#1e2040;border:3px solid #3a3e70;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.partner-info{flex:1;}
.p-name{font-size:16px;font-weight:900;color:#fff;text-shadow:2px 2px 0 #1e2040;}
.p-level{display:inline-block;margin-top:4px;background:#ff6b35;border:2px solid #c94f20;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #c94f20;}
.xp-row{margin-top:10px;}
.xp-lbl{font-size:10px;font-weight:700;color:#8890cc;margin-bottom:4px;}
.xp-track{height:14px;background:#1e2040;border:2px solid #14162e;border-radius:7px;overflow:hidden;}
.xp-fill{height:100%;background:#ffd700;border-radius:5px;position:relative;}
.xp-fill::after{content:'';position:absolute;top:3px;left:4px;right:4px;height:4px;background:rgba(255,255,255,0.35);border-radius:2px;}

.subj-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px;}
.subj-btn{background:#2a2d55;border:3px solid #1e2040;border-radius:14px;box-shadow:0 6px 0 #14162e;padding:14px 10px;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;position:relative;overflow:hidden;text-align:center;}
.subj-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #14162e;}
.subj-btn .s-icon{font-size:36px;display:block;margin-bottom:6px;}
.subj-btn .s-lbl{font-size:13px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #1e2040;}
.subj-btn .s-sub{font-size:9px;font-weight:700;color:#8890cc;margin-top:3px;letter-spacing:1px;}
.new-badge{position:absolute;top:7px;right:7px;background:#ff4757;border:2px solid #c0392b;border-radius:5px;padding:2px 6px;font-size:8px;font-weight:900;color:#fff;}

.cal-wrap{background:#2a2d55;border:3px solid #1e2040;border-radius:14px;box-shadow:0 5px 0 #14162e;padding:14px;margin-bottom:12px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:14px;font-weight:900;color:#ffd700;text-shadow:1px 1px 0 #b8a000;}
.cal-nav{background:#1e2040;border:2px solid #3a3e70;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:900;color:#aaa;cursor:pointer;font-family:'Nunito',sans-serif;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-label{font-size:9px;font-weight:900;color:#555;text-align:center;padding:3px 0;letter-spacing:0.5px;}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#555;background:#1e2040;border:1px solid #2a2d55;position:relative;}
.cal-day.today{border-color:#ff6b35;color:#fff;}
.cal-day.stamped{background:#145a32;border-color:#2ecc71;color:#2ecc71;}
.cal-day.stamped::after{content:'⭐';position:absolute;font-size:7px;top:-3px;right:-3px;}
.cal-day.empty{background:none;border-color:transparent;}

.mission-wrap{background:#2a2d55;border:3px solid #1e2040;border-radius:14px;box-shadow:0 5px 0 #14162e;padding:14px;}
.m-title{font-size:11px;font-weight:900;color:#ffd700;letter-spacing:1.5px;margin-bottom:10px;text-shadow:1px 1px 0 #b8a000;}
.m-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#8890cc;padding:4px 0;}
.m-item.done{color:#2ecc71;}
.m-check{width:20px;height:20px;background:#1e2040;border:2px solid #3a3e70;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.m-item.done .m-check{background:#145a32;border-color:#2ecc71;color:#2ecc71;}

.qz-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.back-btn{background:#3a3e70;border:3px solid #2a2d55;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:900;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 0 #1e2040;}
.back-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #1e2040;}
.qz-name{font-size:13px;font-weight:900;color:#ffd700;text-shadow:1px 1px 0 #b8a000;}
.prog-outer{height:16px;background:#1e2040;border:2px solid #14162e;border-radius:8px;overflow:hidden;margin-bottom:8px;}
.prog-inner{height:100%;background:#2ecc71;position:relative;transition:width 0.3s;}
.prog-inner::after{content:'';position:absolute;top:3px;left:4px;right:4px;height:4px;background:rgba(255,255,255,0.4);border-radius:2px;}
.prog-txt{font-size:10px;font-weight:700;color:#8890cc;text-align:right;margin-bottom:12px;}
.q-block{background:#1e2040;border:3px solid #3a3e70;border-radius:14px;padding:18px;margin-bottom:12px;}
.q-tag{display:inline-block;background:#ff6b35;border:2px solid #c94f20;border-radius:6px;padding:2px 10px;font-size:10px;font-weight:900;color:#fff;margin-bottom:10px;text-shadow:1px 1px 0 #c94f20;}
.q-text{font-size:16px;font-weight:700;line-height:1.7;color:#fff;}
.q-hint{margin-top:12px;background:#252849;border:2px solid #ffd700;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:700;color:#ffd700;display:none;}
.hint-btn{background:#2a2d55;border:2px dashed #3a3e70;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:900;color:#8890cc;cursor:pointer;margin-bottom:12px;width:100%;font-family:'Nunito',sans-serif;}
.choices{display:grid;gap:10px;margin-bottom:12px;}
.choice{background:#2a2d55;border:3px solid #3a3e70;border-radius:12px;box-shadow:0 5px 0 #14162e;padding:14px 16px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:transform 0.1s,box-shadow 0.1s;font-family:'Nunito',sans-serif;width:100%;}
.choice:not(:disabled):active{transform:translateY(4px);box-shadow:0 1px 0 #14162e;}
.choice:not(:disabled):hover{background:#343870;border-color:#5a5e90;}
.choice.correct{background:#145a32;border-color:#2ecc71;box-shadow:0 5px 0 #0a3a1e;color:#2ecc71;}
.choice.wrong{background:#5a0a0a;border-color:#e74c3c;box-shadow:0 5px 0 #3a0505;color:#e74c3c;}
.ch-lbl{width:30px;height:30px;border-radius:7px;background:#1e2040;border:2px solid #3a3e70;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#8890cc;flex-shrink:0;}
.choice.correct .ch-lbl{background:#0a3a1e;border-color:#2ecc71;color:#2ecc71;}
.choice.wrong .ch-lbl{background:#3a0505;border-color:#e74c3c;color:#e74c3c;}
.feedback{border-radius:12px;padding:16px;margin-bottom:12px;display:none;animation:popIn 0.2s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes popIn{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.feedback.correct{background:#145a32;border:3px solid #2ecc71;box-shadow:0 5px 0 #0a3a1e;}
.feedback.wrong{background:#5a0a0a;border:3px solid #e74c3c;box-shadow:0 5px 0 #3a0505;}
.fb-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.fb-ico{font-size:22px;}
.fb-ttl{font-size:15px;font-weight:900;}
.feedback.correct .fb-ttl{color:#2ecc71;}
.feedback.wrong .fb-ttl{color:#e74c3c;}
.fb-exp{font-size:13px;font-weight:700;color:#aaa;line-height:1.6;}
.next-btn{width:100%;padding:15px;background:#ff6b35;border:3px solid #c94f20;border-radius:12px;box-shadow:0 6px 0 #8a3610;color:#fff;font-size:16px;font-weight:900;cursor:pointer;display:none;font-family:'Nunito',sans-serif;text-shadow:1px 1px 0 #c94f20;transition:transform 0.1s,box-shadow 0.1s;}
.next-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #8a3610;}

.result-wrap{text-align:center;padding:20px 0;}
.result-icon{width:110px;height:110px;background:#1e2040;border:4px solid #3a3e70;border-radius:18px;box-shadow:0 8px 0 #14162e;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
.result-score{font-size:46px;font-weight:900;color:#ffd700;text-shadow:3px 3px 0 #b8a000;}
.result-stars{font-size:34px;letter-spacing:6px;margin:8px 0;}
.result-msg{font-size:13px;font-weight:700;color:#8890cc;margin-bottom:16px;line-height:1.6;}
.result-gain{background:#1e2040;border:3px solid #3a3e70;border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;font-weight:700;color:#ffd700;text-shadow:1px 1px 0 #b8a000;line-height:1.8;}
.play-again{width:100%;padding:15px;background:#2ecc71;border:3px solid #27ae60;border-radius:12px;box-shadow:0 6px 0 #1a7a40;color:#fff;font-size:15px;font-weight:900;cursor:pointer;margin-bottom:10px;font-family:'Nunito',sans-serif;text-shadow:1px 1px 0 #1a7a40;transition:transform 0.1s,box-shadow 0.1s;}
.play-again:active{transform:translateY(5px);box-shadow:0 1px 0 #1a7a40;}
.home-lnk{width:100%;padding:13px;background:#3a3e70;border:3px solid #2a2d55;border-radius:12px;box-shadow:0 5px 0 #1e2040;color:#ccc;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform 0.1s,box-shadow 0.1s;}
.home-lnk:active{transform:translateY(4px);box-shadow:0 1px 0 #1e2040;}

.zu-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.flt{background:#2a2d55;border:2px solid #3a3e70;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:900;color:#8890cc;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 0 #1e2040;transition:transform 0.1s;}
.flt:active{transform:translateY(2px);}
.flt.on{background:#ff6b35;border-color:#c94f20;color:#fff;box-shadow:0 3px 0 #8a3610;text-shadow:1px 1px 0 #c94f20;}
.zu-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
.zu-card{background:#2a2d55;border:3px solid #3a3e70;border-radius:14px;box-shadow:0 5px 0 #14162e;padding:14px;text-align:center;}
.zu-card.owned{border-color:#ffd700;box-shadow:0 5px 0 #7a6000;}
.zu-card.locked{opacity:0.35;filter:grayscale(0.7);}
.zu-art{width:64px;height:64px;background:#1e2040;border:2px solid #3a3e70;border-radius:10px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}
.zu-name{font-size:13px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #1e2040;}
.zu-type{display:inline-block;margin-top:4px;background:#3a3e70;border-radius:4px;padding:2px 8px;font-size:9px;font-weight:900;color:#8890cc;letter-spacing:0.5px;}
.zu-lv{background:#ffd700;border:2px solid #b8a000;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:900;color:#1a1a2e;display:inline-block;margin-top:6px;}
.zu-lock{font-size:9px;font-weight:700;color:#5a5e90;margin-top:5px;line-height:1.4;}
</style>
</head>
<body>

<div id="titleScreen">
  <div class="title-logo">SANSUU<span>QUEST</span></div>
  <div class="title-sub">5ねんせいの さんすう ぼうけん</div>
  <div class="title-label">⚔️ ぼうけんの書を えらんでね</div>
  <div id="slotList" style="width:100%;max-width:380px;"></div>
</div>

<div class="modal-bg" id="nameModal" style="display:none;">
  <div class="modal">
    <div class="modal-title">🌟 あたらしい ぼうけんの書</div>
    <input type="text" id="nameInput" placeholder="なまえをいれてね" maxlength="8">
    <button class="modal-btn" onclick="createSave()">ぼうけんをはじめる！</button>
    <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<div class="app" id="mainApp" style="display:none;">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="back-title-btn" onclick="backToTitle()">← 書</button>
      <div class="hdr-logo">SANSUU<span>QUEST</span></div>
    </div>
    <div class="hdr-right">
      <div class="streak-pill">🔥 <span id="strk">0</span></div>
      <div class="coins-pill">🪙 <span id="cns">0</span></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goTab('home',this)">🏠 ホーム</button>
    <button class="tab" onclick="goTab('quiz',this)">⚔️ バトル</button>
    <button class="tab" onclick="goTab('zukan',this)">📖 ずかん</button>
  </div>

  <div id="home" class="screen active">
    <div class="partner-wrap">
      <div class="partner-block" id="pArt"></div>
      <div class="partner-info">
        <div class="p-name" id="pName">フラクロン</div>
        <div class="p-level" id="pLevel">Lv.1 PARTNER</div>
        <div class="xp-row">
          <div class="xp-lbl" id="xpLbl">EXP 0/100</div>
          <div class="xp-track"><div class="xp-fill" id="xpBar" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">◀</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" onclick="calNext()">▶</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="subj-grid">
      <div class="subj-btn" onclick="startBattle('fraction')"><span class="s-icon">🍕</span><div class="s-lbl">分数・小数</div><div class="s-sub">FRACTION</div><div class="new-badge">NEW</div></div>
      <div class="subj-btn" onclick="startBattle('shape')"><span class="s-icon">📐</span><div class="s-lbl">図形・面積</div><div class="s-sub">GEOMETRY</div></div>
      <div class="subj-btn" onclick="startBattle('story')"><span class="s-icon">📝</span><div class="s-lbl">文章題</div><div class="s-sub">WORD PROB</div></div>
      <div class="subj-btn" onclick="startBattle('calc')"><span class="s-icon">⚡</span><div class="s-lbl">計算マスター</div><div class="s-sub">CALCULATE</div></div>
    </div>
    <div class="mission-wrap">
      <div class="m-title">⭐ DAILY MISSION</div>
      <div class="m-item" id="m1"><div class="m-check" id="m1c"></div>きょうはじめてバトルする</div>
      <div class="m-item" id="m2"><div class="m-check" id="m2c"></div>3もん以上せいかい</div>
      <div class="m-item" id="m3"><div class="m-check" id="m3c"></div>ぜんもんせいかい（パーフェクト）</div>
    </div>
  </div>

  <div id="quiz" class="screen">
    <div id="qzContent"><div style="padding:60px 20px;text-align:center;color:#555;font-weight:700;font-size:14px;">ホームからバトルを選んでね！</div></div>
  </div>

  <div id="zukan" class="screen">
    <div class="zu-filter">
      <div class="flt on" onclick="flt('all',this)">すべて</div>
      <div class="flt" onclick="flt('fraction',this)">分数</div>
      <div class="flt" onclick="flt('shape',this)">図形</div>
      <div class="flt" onclick="flt('story',this)">文章題</div>
      <div class="flt" onclick="flt('calc',this)">計算</div>
    </div>
    <div class="zu-grid" id="zuGrid"></div>
  </div>
</div>

<script>
const MONS=[

const SNAME={fraction:"🍕 FRACTION",shape:"📐 GEOMETRY",story:"📝 WORD PROB",calc:"⚡ CALC"};
const LBL=["Ａ","Ｂ","Ｃ","Ｄ"];
const ICONS=["🧒","👧","🧑"];

let currentSlot=null,curSubj=null,qIdx=0,score=0,answered=false,curFilter="all";
let calYear,calMonth;

function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function loadSaves(){const r=localStorage.getItem('sq_saves');return r?JSON.parse(r):[null,null,null];}
function saveSaves(s){localStorage.setItem('sq_saves',JSON.stringify(s));}
function defaultSave(name){return{name,coins:0,streak:0,lastPlay:'',stampDates:[],ownedMons:[0],xp:0,lv:1,missions:{date:'',played:false,score3:false,perfect:false}};}

function renderTitle(){
  const saves=loadSaves();
  document.getElementById('slotList').innerHTML=saves.map((s,i)=>{
    if(!s)return`<div class="save-slot empty" onclick="openNewSlot(${i})"><div class="slot-icon">${ICONS[i]}</div><div class="slot-info"><div class="slot-new">⊕ あたらしい ぼうけんの書</div></div></div>`;
    return`<div class="save-slot" onclick="loadSlot(${i})"><div class="slot-icon">${ICONS[i]}</div><div class="slot-info"><div class="slot-name">${s.name}</div><div class="slot-stats">🪙 ${s.coins}コイン　🔥 ${s.streak}連続<br>📖 ${s.ownedMons.length}/12モンスター　📅 ${s.stampDates.length}日スタンプ</div></div><div class="slot-del" onclick="event.stopPropagation();deleteSlot(${i})">けす</div></div>`;
  }).join('');
}

let pendingSlot=null;
function openNewSlot(i){pendingSlot=i;document.getElementById('nameInput').value='';document.getElementById('nameModal').style.display='flex';}
function closeModal(){document.getElementById('nameModal').style.display='none';}
function createSave(){
  const name=document.getElementById('nameInput').value.trim()||'ぼうけんしゃ';
  const saves=loadSaves();saves[pendingSlot]=defaultSave(name);saveSaves(saves);closeModal();loadSlot(pendingSlot);
}
function deleteSlot(i){if(!confirm('このぼうけんの書を消しますか？'))return;const saves=loadSaves();saves[i]=null;saveSaves(saves);renderTitle();}

function loadSlot(i){
  currentSlot=i;
  const saves=loadSaves();const s=saves[i];
  const today=todayStr();
  if(s.lastPlay){const diff=Math.round((new Date(today)-new Date(s.lastPlay))/(1000*60*60*24));if(diff>1)s.streak=0;}
  if(s.missions.date!==today)s.missions={date:today,played:false,score3:false,perfect:false};
  saveSaves(saves);
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
  updateUI();
}

function getSave(){return loadSaves()[currentSlot];}
function putSave(s){const saves=loadSaves();saves[currentSlot]=s;saveSaves(saves);}

function updateUI(){
  const s=getSave();
  document.getElementById('strk').textContent=s.streak;
  document.getElementById('cns').textContent=s.coins;
  const xpMax=s.lv*100;
  document.getElementById('xpLbl').textContent=`EXP ${s.xp}/${xpMax}`;
  document.getElementById('xpBar').style.width=Math.round((s.xp/xpMax)*100)+'%';
  document.getElementById('pLevel').textContent=`Lv.${s.lv} PARTNER`;
  const partner=MONS[s.ownedMons[0]]||MONS[0];
  document.getElementById('pArt').innerHTML=partner.svg;
  document.getElementById('pName').textContent=partner.name;
  const m=s.missions;
  [[1,m.played],[2,m.score3],[3,m.perfect]].forEach(([n,done])=>{
    document.getElementById('m'+n).className='m-item'+(done?' done':'');
    document.getElementById('m'+n+'c').textContent=done?'✓':'';
  });
  renderCal();
}

function backToTitle(){document.getElementById('mainApp').style.display='none';document.getElementById('titleScreen').style.display='flex';renderTitle();}

function goTab(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  if(id==='zukan')renderZukan(curFilter);
}

function renderCal(){
  const s=getSave();const stamps=new Set(s.stampDates||[]);const today=todayStr();
  const y=calYear,m=calMonth;
  const firstDay=new Date(y,m,1).getDay();const daysInMonth=new Date(y,m+1,0).getDate();
  const mNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calTitle').textContent=`${y}年 ${mNames[m]}`;
  let html=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html+=`<div class="cal-day${ds===today?' today':''}${stamps.has(ds)?' stamped':''}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function startBattle(subj){curSubj=subj;qIdx=0;score=0;answered=false;document.querySelectorAll('.tab')[1].click();renderQ();}

function renderQ(){
  const qs=QS[curSubj];if(qIdx>=qs.length){showResult();return;}const q=qs[qIdx];
  document.getElementById('qzContent').innerHTML=`
    <div class="qz-top"><button class="back-btn" onclick="goHome()">← もどる</button><div class="qz-name">${SNAME[curSubj]} BATTLE</div></div>
    <div class="prog-outer"><div class="prog-inner" style="width:${Math.round((qIdx/qs.length)*100)}%"></div></div>
    <div class="prog-txt">QUESTION ${qIdx+1} / ${qs.length}</div>
    <div class="q-block"><div class="q-tag">Q.${qIdx+1}</div><div class="q-text">${q.q}</div>${q.hint?`<div class="q-hint" id="hintBox">💡 ${q.hint}</div>`:''}</div>
    ${q.hint?`<button class="hint-btn" onclick="document.getElementById('hintBox').style.display='block';this.style.display='none';">💡 ヒントを見る</button>`:''}
    <div class="choices">${q.choices.map((c,i)=>`<button class="choice" id="ch${i}" onclick="doAns(${i})"><span class="ch-lbl">${LBL[i]}</span>${c}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="nextQ()">${qIdx+1<qs.length?'つぎへ →':'けっかを見る 🏆'}</button>`;
  answered=false;
}

function doAns(idx){
  if(answered)return;answered=true;
  const q=QS[curSubj][qIdx];const ok=idx===q.ans;if(ok)score++;
  document.querySelectorAll('.choice').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===idx&&!ok)b.classList.add('wrong');});
  const fb=document.getElementById('fb');fb.className='feedback '+(ok?'correct':'wrong');fb.style.display='block';
  fb.innerHTML=`<div class="fb-top"><div class="fb-ico">${ok?'⭕':'❌'}</div><div class="fb-ttl">${ok?'せいかい！すごい！':'ざんねん…'}</div></div><div class="fb-exp">${q.exp}</div>`;
  document.getElementById('nxt').style.display='block';
}
function nextQ(){qIdx++;renderQ();}

function showResult(){
  const total=QS[curSubj].length;
  const stars=score>=total?'⭐⭐⭐':score>=Math.ceil(total*0.6)?'⭐⭐':'⭐';
  const msg=score===total?'パーフェクト！全問正解だ！🎉':score>=3?'よくできました！もう少しで完璧！':'つぎはがんばろう！💪';
  const s=getSave();const today=todayStr();
  s.coins+=score*10;s.xp+=score*15;
  const xpMax=s.lv*100;if(s.xp>=xpMax){s.xp-=xpMax;s.lv++;}
  let gotStamp=false;
  if(!s.stampDates.includes(today)){
    s.stampDates.push(today);gotStamp=true;
    const last=s.lastPlay?new Date(s.lastPlay):null;
    const now=new Date(today);
    if(last){const diff=Math.round((now-last)/(1000*60*60*24));s.streak=diff===1?s.streak+1:1;}else{s.streak=1;}
  }
  s.lastPlay=today;
  if(!s.missions.played)s.missions.played=true;
  if(score>=3&&!s.missions.score3)s.missions.score3=true;
  if(score===total&&!s.missions.perfect)s.missions.perfect=true;
  let newMon=null;
  if(score>=3){const u=MONS.filter(m=>m.subj===curSubj&&!s.ownedMons.includes(m.id));if(u.length>0){newMon=u[0];s.ownedMons.push(newMon.id);}}
  putSave(s);updateUI();
  const icon=MONS[s.ownedMons[s.ownedMons.length-1]]||MONS[0];
  document.getElementById('qzContent').innerHTML=`
    <div class="result-wrap">
      <div class="result-icon">${icon.svg}</div>
      <div class="result-score">${score}/${total}</div>
      <div class="result-stars">${stars}</div>
      <div class="result-msg">${msg}</div>
      <div class="result-gain">🪙 +${score*10}コイン！<br>✨ +${score*15} EXP！${newMon?`<br>🎉 ${newMon.name} をゲット！`:''}${gotStamp?'<br>📅 きょうのスタンプ ゲット！':''}</div>
      <button class="play-again" onclick="startBattle('${curSubj}')">🔄 もう一度バトル！</button>
      <button class="home-lnk" onclick="goHome()">🏠 ホームにもどる</button>
    </div>`;
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('home').classList.add('active');document.querySelectorAll('.tab')[0].classList.add('active');updateUI();
}

function flt(f,el){curFilter=f;document.querySelectorAll('.flt').forEach(t=>t.classList.remove('on'));el.classList.add('on');renderZukan(f);}

function renderZukan(filter){
  const s=getSave();
  const list=filter==='all'?MONS:MONS.filter(m=>m.subj===filter||m.subj==='all');
  document.getElementById('zuGrid').innerHTML=list.map(m=>{
    const owned=s.ownedMons.includes(m.id);
    return`<div class="zu-card ${owned?'owned':'locked'}"><div class="zu-art">${m.svg}</div><div class="zu-name">${owned?m.name:'???'}</div><div class="zu-type">${m.type}</div>${owned?`<div class="zu-lv">ゲット済み ✓</div>`:`<div class="zu-lock">${m.unlock}</div>`}</div>`;
  }).join('');
}

renderTitle();
</script>
</body>
</html>
