<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SANSUU QUEST</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;SANSUU QUEST&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#1a1a2e&quot;}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito','Hiragino Kaku Gothic ProN',sans-serif;
  background:#1a1a2e;
  color:#fff;
  min-height:100vh;
}
.app{max-width:420px;margin:0 auto;padding-bottom:90px;}

/* ===== HEADER ===== */
.hdr{
  background:#252849;
  border-bottom:4px solid #1a1c38;
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:30;
}
.hdr-logo{
  font-size:18px;font-weight:900;
  color:#fff;
  text-shadow:3px 3px 0 #1a1c38;
  letter-spacing:1px;
}
.hdr-logo span{color:#ff6b35;}
.hdr-pills{display:flex;gap:6px;align-items:center;}
.streak-pill{
  background:#ffd700;
  border:3px solid #b8a000;
  border-radius:8px;
  padding:4px 10px;
  font-size:13px;font-weight:900;
  color:#1a1a2e;
}
.coins-pill{
  background:#ff6b35;
  border:3px solid #c94f20;
  border-radius:8px;
  padding:4px 10px;
  font-size:13px;font-weight:900;
  color:#fff;
  text-shadow:1px 1px 0 #c94f20;
  display:flex;align-items:center;gap:5px;
}

/* ===== TABS ===== */
.tabs{
  display:flex;
  background:#1e2040;
  border-bottom:4px solid #14162e;
  padding:0 8px;
  gap:4px;
  position:sticky;top:64px;z-index:29;
}
.tab{
  flex:1;padding:11px 4px;
  font-size:12px;font-weight:900;
  color:#555;background:none;border:none;cursor:pointer;
  letter-spacing:0.5px;border-bottom:4px solid transparent;
  margin-bottom:-4px;transition:color 0.15s;
  font-family:'Nunito',sans-serif;
}
.tab.active{color:#fff;border-bottom-color:#ff6b35;}

/* ===== SCREENS ===== */
.screen{display:none;padding:12px;}
.screen.active{display:block;}

/* ===== PARTNER ===== */
.partner-wrap{
  background:#2a2d55;
  border:3px solid #1e2040;
  border-radius:14px;
  box-shadow:0 6px 0 #14162e;
  padding:14px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:14px;
}
.partner-block{
  width:80px;height:80px;
  background:#1e2040;
  border:3px solid #3a3e70;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  position:relative;overflow:hidden;
}
.partner-block::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:rgba(255,255,255,0.12);
}
.partner-info{flex:1;}
.p-name{font-size:17px;font-weight:900;color:#fff;text-shadow:2px 2px 0 #1e2040;}
.p-level{
  display:inline-block;margin-top:4px;
  background:#ff6b35;border:2px solid #c94f20;
  border-radius:6px;padding:2px 9px;
  font-size:10px;font-weight:900;color:#fff;
  text-shadow:1px 1px 0 #c94f20;
}
.xp-row{margin-top:10px;}
.xp-lbl{font-size:10px;font-weight:700;color:#8890cc;margin-bottom:4px;}
.xp-track{
  height:14px;background:#1e2040;
  border:2px solid #14162e;border-radius:7px;
  overflow:hidden;
}
.xp-fill{
  height:100%;background:#ffd700;border-radius:5px;
  position:relative;
}
.xp-fill::after{
  content:'';position:absolute;top:3px;left:4px;right:4px;height:4px;
  background:rgba(255,255,255,0.35);border-radius:2px;
}

/* ===== SUBJECT BUTTONS ===== */
.subj-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px;}
.subj-btn{
  background:#2a2d55;
  border:3px solid #1e2040;
  border-radius:14px;
  box-shadow:0 6px 0 #14162e;
  padding:16px 10px;
  cursor:pointer;
  transition:transform 0.1s,box-shadow 0.1s;
  position:relative;overflow:hidden;
  text-align:center;
}
.subj-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #14162e;}
.subj-btn .s-icon{font-size:38px;display:block;margin-bottom:6px;filter:drop-shadow(2px 2px 0 rgba(0,0,0,0.4));}
.subj-btn .s-lbl{font-size:13px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #1e2040;}
.subj-btn .s-sub{font-size:9px;font-weight:700;color:#8890cc;margin-top:3px;letter-spacing:1px;}
.new-badge{
  position:absolute;top:7px;right:7px;
  background:#ff4757;border:2px solid #c0392b;
  border-radius:5px;padding:2px 6px;
  font-size:8px;font-weight:900;color:#fff;
}

/* ===== MISSION ===== */
.mission-wrap{
  background:#2a2d55;border:3px solid #1e2040;
  border-radius:14px;box-shadow:0 5px 0 #14162e;
  padding:14px;
}
.m-title{
  font-size:11px;font-weight:900;color:#ffd700;
  letter-spacing:1.5px;margin-bottom:10px;
  text-shadow:1px 1px 0 #b8a000;
}
.m-item{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;color:#8890cc;
  padding:4px 0;
}
.m-item.done{color:#2ecc71;}
.m-check{
  width:20px;height:20px;
  background:#1e2040;border:2px solid #3a3e70;
  border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;
}
.m-item.done .m-check{background:#145a32;border-color:#2ecc71;color:#2ecc71;}

/* ===== QUIZ ===== */
.qz-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.back-btn{
  background:#3a3e70;border:3px solid #2a2d55;
  border-radius:10px;padding:7px 14px;
  font-size:12px;font-weight:900;color:#fff;cursor:pointer;
  font-family:'Nunito',sans-serif;
  box-shadow:0 4px 0 #1e2040;
}
.back-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #1e2040;}
.qz-name{font-size:14px;font-weight:900;color:#ffd700;text-shadow:1px 1px 0 #b8a000;}
.prog-outer{
  height:16px;background:#1e2040;
  border:2px solid #14162e;border-radius:8px;
  overflow:hidden;margin-bottom:8px;
}
.prog-inner{
  height:100%;background:#2ecc71;
  position:relative;transition:width 0.3s;
}
.prog-inner::after{
  content:'';position:absolute;top:3px;left:4px;right:4px;height:4px;
  background:rgba(255,255,255,0.4);border-radius:2px;
}
.prog-txt{font-size:11px;font-weight:700;color:#8890cc;text-align:right;margin-bottom:12px;}

.q-block{
  background:#1e2040;border:3px solid #3a3e70;
  border-radius:14px;padding:18px;margin-bottom:12px;
}
.q-tag{
  display:inline-block;
  background:#ff6b35;border:2px solid #c94f20;
  border-radius:6px;padding:2px 10px;
  font-size:10px;font-weight:900;color:#fff;
  margin-bottom:10px;text-shadow:1px 1px 0 #c94f20;
}
.q-text{font-size:16px;font-weight:700;line-height:1.7;color:#fff;}
.q-hint{
  margin-top:12px;background:#252849;
  border:2px solid #ffd700;border-radius:8px;
  padding:10px 12px;font-size:12px;font-weight:700;color:#ffd700;
  display:none;
}

.hint-btn{
  background:#2a2d55;border:2px dashed #3a3e70;
  border-radius:10px;padding:8px 14px;
  font-size:12px;font-weight:900;color:#8890cc;
  cursor:pointer;margin-bottom:12px;width:100%;
  font-family:'Nunito',sans-serif;
}

.choices{display:grid;gap:10px;margin-bottom:12px;}
.choice{
  background:#2a2d55;border:3px solid #3a3e70;
  border-radius:12px;box-shadow:0 5px 0 #14162e;
  padding:14px 16px;
  color:#fff;font-size:16px;font-weight:700;
  cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:12px;
  transition:transform 0.1s,box-shadow 0.1s;
  font-family:'Nunito',sans-serif;width:100%;
}
.choice:not(:disabled):active{transform:translateY(4px);box-shadow:0 1px 0 #14162e;}
.choice:not(:disabled):hover{background:#343870;border-color:#5a5e90;}
.choice.correct{background:#145a32;border-color:#2ecc71;box-shadow:0 5px 0 #0a3a1e;color:#2ecc71;}
.choice.wrong{background:#5a0a0a;border-color:#e74c3c;box-shadow:0 5px 0 #3a0505;color:#e74c3c;}
.ch-lbl{
  width:30px;height:30px;border-radius:7px;
  background:#1e2040;border:2px solid #3a3e70;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#8890cc;flex-shrink:0;
}
.choice.correct .ch-lbl{background:#0a3a1e;border-color:#2ecc71;color:#2ecc71;}
.choice.wrong .ch-lbl{background:#3a0505;border-color:#e74c3c;color:#e74c3c;}

.feedback{
  border-radius:12px;padding:16px;
  margin-bottom:12px;display:none;
  animation:popIn 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.feedback.correct{background:#145a32;border:3px solid #2ecc71;box-shadow:0 5px 0 #0a3a1e;}
.feedback.wrong{background:#5a0a0a;border:3px solid #e74c3c;box-shadow:0 5px 0 #3a0505;}
.fb-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.fb-ico{font-size:24px;}
.fb-ttl{font-size:16px;font-weight:900;}
.feedback.correct .fb-ttl{color:#2ecc71;text-shadow:1px 1px 0 #0a3a1e;}
.feedback.wrong .fb-ttl{color:#e74c3c;text-shadow:1px 1px 0 #3a0505;}
.fb-exp{font-size:13px;font-weight:700;color:#aaa;line-height:1.6;}

.next-btn{
  width:100%;padding:16px;
  background:#ff6b35;border:3px solid #c94f20;
  border-radius:12px;box-shadow:0 6px 0 #8a3610;
  color:#fff;font-size:17px;font-weight:900;
  cursor:pointer;display:none;
  font-family:'Nunito',sans-serif;
  text-shadow:2px 2px 0 #c94f20;
  transition:transform 0.1s,box-shadow 0.1s;
}
.next-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #8a3610;}

/* ===== RESULT ===== */
.result-wrap{text-align:center;padding:20px 0;}
.result-icon{
  width:120px;height:120px;
  background:#1e2040;border:4px solid #3a3e70;
  border-radius:18px;box-shadow:0 8px 0 #14162e;
  margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
}
.result-score{font-size:48px;font-weight:900;color:#ffd700;text-shadow:3px 3px 0 #b8a000;}
.result-stars{font-size:36px;letter-spacing:6px;margin:10px 0;}
.result-msg{font-size:14px;font-weight:700;color:#8890cc;margin-bottom:18px;line-height:1.6;}
.result-gain{
  background:#1e2040;border:3px solid #3a3e70;
  border-radius:12px;padding:14px;margin-bottom:18px;
  font-size:14px;font-weight:700;color:#ffd700;
  text-shadow:1px 1px 0 #b8a000;line-height:1.8;
}
.play-again{
  width:100%;padding:16px;
  background:#2ecc71;border:3px solid #27ae60;
  border-radius:12px;box-shadow:0 6px 0 #1a7a40;
  color:#fff;font-size:16px;font-weight:900;
  cursor:pointer;margin-bottom:10px;
  font-family:'Nunito',sans-serif;
  text-shadow:1px 1px 0 #1a7a40;
  transition:transform 0.1s,box-shadow 0.1s;
}
.play-again:active{transform:translateY(5px);box-shadow:0 1px 0 #1a7a40;}
.home-lnk{
  width:100%;padding:14px;
  background:#3a3e70;border:3px solid #2a2d55;
  border-radius:12px;box-shadow:0 5px 0 #1e2040;
  color:#ccc;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;
  transition:transform 0.1s,box-shadow 0.1s;
}
.home-lnk:active{transform:translateY(4px);box-shadow:0 1px 0 #1e2040;}

/* ===== ZUKAN ===== */
.zu-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.flt{
  background:#2a2d55;border:2px solid #3a3e70;
  border-radius:8px;padding:6px 12px;
  font-size:11px;font-weight:900;color:#8890cc;
  cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:0 3px 0 #1e2040;
  transition:transform 0.1s,box-shadow 0.1s;
}
.flt:active{transform:translateY(2px);box-shadow:0 1px 0 #1e2040;}
.flt.on{background:#ff6b35;border-color:#c94f20;color:#fff;box-shadow:0 3px 0 #8a3610;text-shadow:1px 1px 0 #c94f20;}
.zu-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
.zu-card{
  background:#2a2d55;border:3px solid #3a3e70;
  border-radius:14px;box-shadow:0 5px 0 #14162e;
  padding:14px;text-align:center;
}
.zu-card.owned{border-color:#ffd700;box-shadow:0 5px 0 #7a6000;}
.zu-card.locked{opacity:0.35;filter:grayscale(0.7);}
.zu-art{
  width:64px;height:64px;
  background:#1e2040;border:2px solid #3a3e70;
  border-radius:10px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
}
.zu-name{font-size:13px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #1e2040;}
.zu-type{
  display:inline-block;margin-top:4px;
  background:#3a3e70;border-radius:4px;
  padding:2px 8px;font-size:9px;font-weight:900;color:#8890cc;letter-spacing:0.5px;
}
.zu-lv{
  background:#ffd700;border:2px solid #b8a000;
  border-radius:6px;padding:2px 8px;
  font-size:10px;font-weight:900;color:#1a1a2e;
  display:inline-block;margin-top:6px;
}
.zu-lock{font-size:9px;font-weight:700;color:#5a5e90;margin-top:5px;line-height:1.4;}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo">SANSUU<span>QUEST</span></div>
    <div class="hdr-pills">
      <div class="streak-pill">🔥 <span id="strk">3</span></div>
      <div class="coins-pill">🪙 <b id="cns">120</b></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="goTab('home',this)">🏠 ホーム</button>
    <button class="tab" onclick="goTab('quiz',this)">⚔️ バトル</button>
    <button class="tab" onclick="goTab('zukan',this)">📖 ずかん</button>
  </div>

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="partner-wrap">
      <div class="partner-block" id="pArt"></div>
      <div class="partner-info">
        <div class="p-name" id="pName">フラクロン</div>
        <div class="p-level">Lv.5 PARTNER</div>
        <div class="xp-row">
          <div class="xp-lbl">EXP 68/100 → Lv.6まであと32！</div>
          <div class="xp-track"><div class="xp-fill" style="width:68%"></div></div>
        </div>
      </div>
    </div>
    <div class="subj-grid">
      <div class="subj-btn" onclick="startBattle('fraction')">
        <span class="s-icon">🍕</span>
        <div class="s-lbl">分数・小数</div>
        <div class="s-sub">FRACTION</div>
        <div class="new-badge">NEW</div>
      </div>
      <div class="subj-btn" onclick="startBattle('shape')">
        <span class="s-icon">📐</span>
        <div class="s-lbl">図形・面積</div>
        <div class="s-sub">GEOMETRY</div>
      </div>
      <div class="subj-btn" onclick="startBattle('story')">
        <span class="s-icon">📝</span>
        <div class="s-lbl">文章題</div>
        <div class="s-sub">WORD PROB</div>
      </div>
      <div class="subj-btn" onclick="startBattle('calc')">
        <span class="s-icon">⚡</span>
        <div class="s-lbl">計算マスター</div>
        <div class="s-sub">CALCULATE</div>
      </div>
    </div>
    <div class="mission-wrap">
      <div class="m-title">⭐ DAILY MISSION</div>
      <div class="m-item done"><div class="m-check">✓</div>分数の問題を3問解く</div>
      <div class="m-item"><div class="m-check"></div>全問正解でコンボをつなぐ</div>
      <div class="m-item"><div class="m-check"></div>新モンスターをゲットする</div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div id="qzContent">
      <div style="padding:60px 20px;text-align:center;color:#555;font-weight:700;font-size:14px;">
        ホームからバトルを選んでね！
      </div>
    </div>
  </div>

  <!-- ZUKAN -->
  <div id="zukan" class="screen">
    <div class="zu-filter">
      <div class="flt on" onclick="flt('all',this)">すべて</div>
      <div class="flt" onclick="flt('fraction',this)">分数</div>
      <div class="flt" onclick="flt('shape',this)">図形</div>
      <div class="flt" onclick="flt('story',this)">文章題</div>
      <div class="flt" onclick="flt('calc',this)">計算</div>
    </div>
    <div class="zu-grid" id="zuGrid"></div>
  </div>
</div>

<script>

  {id:2,name:"カルクス",type:"CALC",subj:"calc",lv:2,owned:true,unlock:"計算バトル初勝利",

const QS={
  fraction:[
    {q:"1/2 + 1/4 はいくつ？",choices:["1/6","3/4","2/6","1/3"],ans:1,exp:"分母をそろえると 2/4 + 1/4 = 3/4 だよ！"},
    {q:"3/5 - 1/5 はいくつ？",choices:["4/5","2/5","2/10","1/5"],ans:1,exp:"分母が同じとき分子を引くよ。3−1=2 → 2/5！"},
    {q:"0.5 を分数にすると？",choices:["5/10","1/2","5/100","1/5"],ans:1,exp:"0.5 = 5/10 = 1/2。約分しよう！"},
    {q:"2/3 + 1/6 はいくつ？",choices:["3/9","5/6","3/6","2/6"],ans:1,exp:"2/3 = 4/6 に直して 4/6 + 1/6 = 5/6！"},
    {q:"1 - 3/8 はいくつ？",choices:["2/8","3/8","5/8","4/8"],ans:2,exp:"1 = 8/8 にして 8/8 − 3/8 = 5/8！"},
  ],
  shape:[
    {q:"底辺6cm、高さ4cmの三角形の面積は？",choices:["24cm²","12cm²","20cm²","10cm²"],ans:1,exp:"三角形 = 底辺×高さ÷2 = 6×4÷2 = 12cm²！"},
    {q:"たて5cm、横8cmの長方形の面積は？",choices:["26cm²","40cm²","13cm²","16cm²"],ans:1,exp:"長方形 = たて×横 = 5×8 = 40cm²！"},
    {q:"1辺が7cmの正方形の面積は？",choices:["28cm²","14cm²","49cm²","42cm²"],ans:2,exp:"正方形 = 1辺×1辺 = 7×7 = 49cm²！"},
    {q:"底辺10cm・高さ6cmの平行四辺形は？",choices:["32cm²","60cm²","16cm²","30cm²"],ans:1,exp:"平行四辺形 = 底辺×高さ = 10×6 = 60cm²！"},
    {q:"面積18cm²、底辺9cmの三角形の高さは？",choices:["2cm","4cm","9cm","6cm"],ans:1,hint:"面積 = 底辺×高さ÷2 を使おう！",exp:"18 = 9×高さ÷2 → 高さ = 4cm！"},
  ],
  story:[
    {q:"時速60kmで2時間走ると何km？",choices:["30km","120km","62km","90km"],ans:1,exp:"距離 = 速さ×時間 = 60×2 = 120km！"},

    {q:"1周2kmを4周走ると何km？",choices:["6km","8km","4km","10km"],ans:1,exp:"2km×4周 = 8km！"},
    {q:"全体の3/5が150人。全体は？",choices:["90人","250人","300人","200人"],ans:1,exp:"全体×3/5 = 150 → 150÷3/5 = 250人！"},
    {q:"りんご3個+みかん5個=890円。りんごはみかんより30円高い。みかん1個は？",choices:["80円","95円","100円","110円"],ans:2,hint:"りんごをみかん+30円で考えよう",exp:"8×みかん + 90 = 890 → みかん = 100円！"},

    {q:"2.5 × 1.4 = ？",choices:["3.0","3.5","2.8","3.2"],ans:1,exp:"25×14÷100 = 350÷100 = 3.5！"},
    {q:"100 − 37 − 23 = ？",choices:["40","50","60","70"],ans:0,exp:"37+23=60、100−60 = 40！"},
    {q:"48 ÷ 0.6 = ？",choices:["28.8","80","8","0.8"],ans:1,exp:"48×10÷6 = 480÷6 = 80！"},

const SNAME={fraction:"🍕 FRACTION",shape:"📐 GEOMETRY",story:"📝 WORD PROB",calc:"⚡ CALC"};
const LBL=["Ａ","Ｂ","Ｃ","Ｄ"];
let coins=120,streak=3,curSubj=null,qIdx=0,score=0,answered=false,curFilter="all";

document.getElementById('pArt').innerHTML=MONS[0].svg;

function goTab(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='zukan') renderZukan(curFilter);
}

function startBattle(subj){
  curSubj=subj;qIdx=0;score=0;answered=false;
  document.querySelectorAll('.tab')[1].click();
  renderQ();
}

function renderQ(){
  const qs=QS[curSubj];
  if(qIdx>=qs.length){showResult();return;}
  const q=qs[qIdx];
  document.getElementById('qzContent').innerHTML=`
    <div class="qz-top">
      <button class="back-btn" onclick="goHome()">← もどる</button>
      <div class="qz-name">${SNAME[curSubj]} BATTLE</div>
    </div>
    <div class="prog-outer"><div class="prog-inner" style="width:${Math.round((qIdx/qs.length)*100)}%"></div></div>
    <div class="prog-txt">QUESTION ${qIdx+1} / ${qs.length}</div>
    <div class="q-block">
      <div class="q-tag">Q.${qIdx+1}</div>
      <div class="q-text">${q.q}</div>
      ${q.hint?`<div class="q-hint" id="hintBox">💡 ${q.hint}</div>`:''}
    </div>
    ${q.hint?`<button class="hint-btn" onclick="document.getElementById('hintBox').style.display='block';this.style.display='none';">💡 ヒントを見る</button>`:''}
    <div class="choices">${q.choices.map((c,i)=>`<button class="choice" id="ch${i}" onclick="doAns(${i})"><span class="ch-lbl">${LBL[i]}</span>${c}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="nextQ()">${qIdx+1<qs.length?'つぎへ →':'けっかを見る 🏆'}</button>
  `;
  answered=false;
}

function doAns(idx){
  if(answered)return;
  answered=true;
  const q=QS[curSubj][qIdx];
  const ok=idx===q.ans;
  if(ok){score++;coins+=10;streak++;document.getElementById('cns').textContent=coins;document.getElementById('strk').textContent=streak;}
  else{streak=Math.max(0,streak-1);document.getElementById('strk').textContent=streak;}
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.ans)b.classList.add('correct');
    else if(i===idx&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  fb.className='feedback '+(ok?'correct':'wrong');
  fb.style.display='block';
  fb.innerHTML=`<div class="fb-top"><div class="fb-ico">${ok?'⭕':'❌'}</div><div class="fb-ttl">${ok?'せいかい！すごい！':'ざんねん…'}</div></div><div class="fb-exp">${q.exp}</div>`;
  document.getElementById('nxt').style.display='block';
}

function nextQ(){qIdx++;renderQ();}

function showResult(){
  const total=QS[curSubj].length;
  const stars=score>=total?'⭐⭐⭐':score>=Math.ceil(total*0.6)?'⭐⭐':'⭐';
  const msg=score===total?'パーフェクト！全問正解だ！🎉':score>=3?'よくできました！もう少しで完璧！':'つぎはがんばろう！💪';
  const icon=MONS.find(m=>m.subj===curSubj&&m.owned)||MONS[0];
  document.getElementById('qzContent').innerHTML=`
    <div class="result-wrap">
      <div class="result-icon">${icon.svg}</div>
      <div class="result-score">${score}/${total}</div>
      <div class="result-stars">${stars}</div>
      <div class="result-msg">${msg}</div>
      <div class="result-gain">🪙 +${score*10}コイン ゲット！${score>=3?'<br>🎉 モンスターのかけら 入手！':''}</div>
      <button class="play-again" onclick="startBattle('${curSubj}')">🔄 もう一度バトル！</button>
      <button class="home-lnk" onclick="goHome()">🏠 ホームにもどる</button>
    </div>
  `;
}

function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('home').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function flt(f,el){
  curFilter=f;
  document.querySelectorAll('.flt').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderZukan(f);
}

function renderZukan(filter){
  const list=filter==='all'?MONS:MONS.filter(m=>m.subj===filter||m.subj==='all');
  document.getElementById('zuGrid').innerHTML=list.map(m=>`
    <div class="zu-card ${m.owned?'owned':'locked'}">
      <div class="zu-art">${m.svg}</div>
      <div class="zu-name">${m.owned?m.name:'???'}</div>
      <div class="zu-type">${m.type}</div>
      ${m.owned?`<div class="zu-lv">Lv.${m.lv}</div>`:`<div class="zu-lock">${m.unlock}</div>`}
    </div>
  `).join('');
}
</script>
